name: Test rai-audit-ml

on:
  push:
    paths:
      - "packages/rai-audit-ml/**"
      - "packages/rai-audit-core/**"
      - ".github/workflows/test-ml.yml"
  pull_request:
    paths:
      - "packages/rai-audit-ml/**"
      - "packages/rai-audit-core/**"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install packages with test deps
        run: uv pip install --python ${{ matrix.python-version }} -e "packages/rai-audit-core" -e "packages/rai-audit-ml" pytest

      - name: Run tests
        run: uv run --python ${{ matrix.python-version }} pytest packages/rai-audit-ml/tests -v
