name: Test rai-audit-llm

on:
  push:
    paths:
      - "packages/rai-audit-llm/**"
      - "packages/rai-audit-core/**"
      - ".github/workflows/test-llm.yml"
  pull_request:
    paths:
      - "packages/rai-audit-llm/**"
      - "packages/rai-audit-core/**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - run: uv venv
      - run: uv pip install -e "packages/rai-audit-core" -e "packages/rai-audit-llm" pytest
      - run: uv run pytest packages/rai-audit-llm/tests -v
