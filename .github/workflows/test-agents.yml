name: Test rai-audit-agents

on:
  push:
    paths:
      - "packages/rai-audit-agents/**"
      - "packages/rai-audit-core/**"
      - ".github/workflows/test-agents.yml"
  pull_request:
    paths:
      - "packages/rai-audit-agents/**"
      - "packages/rai-audit-core/**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - run: uv pip install -e "packages/rai-audit-core" -e "packages/rai-audit-agents" pytest
      - run: uv run pytest packages/rai-audit-agents/tests -v
