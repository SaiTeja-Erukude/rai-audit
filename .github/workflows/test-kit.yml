name: Test rai-audit-kit

on:
  push:
    paths:
      - "packages/rai-audit-kit/**"
      - "packages/rai-audit-core/**"
      - "packages/rai-audit-ml/**"
      - ".github/workflows/test-kit.yml"
  pull_request:
    paths:
      - "packages/rai-audit-kit/**"
      - "packages/rai-audit-core/**"
      - "packages/rai-audit-ml/**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - run: uv pip install -e "packages/rai-audit-core" -e "packages/rai-audit-ml" -e "packages/rai-audit-kit" pytest
      - run: uv run pytest packages/rai-audit-kit/tests -v
      - run: uv run rai-audit --help
