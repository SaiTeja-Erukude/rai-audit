[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "rai-audit-dl"
version = "0.1.7"
description = "Deep learning audits for image classification, medical imaging, and scientific AI"
readme = "README.md"
license = { file = "LICENSE" }
authors = [{ name = "Sai Teja Erukude" }]
requires-python = ">=3.10"
keywords = ["responsible-ai", "deep-learning", "image-audit", "medical-imaging"]
classifiers = [
  "Development Status :: 4 - Beta",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
]
dependencies = [
  "rai-audit-core>=0.1.0",
  "numpy>=1.24",
  "pandas>=2.0",
]

[project.optional-dependencies]
torch = ["torch>=2.0", "torchvision>=0.15"]
tensorflow = ["tensorflow>=2.13"]

[project.entry-points."rai_audit.plugins"]
dl = "rai_audit.dl.cli:register"

[tool.uv.sources]
rai-audit-core = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/rai_audit"]

[tool.hatch.build.targets.wheel.sources]
"src" = ""
