[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "rai-audit-agents"
version = "0.1.5"
description = "Agentic AI audits for tool-use, memory, permissions, and prompt injection"
readme = "README.md"
license = { file = "LICENSE" }
authors = [{ name = "Sai Teja Erukude" }]
requires-python = ">=3.10"
keywords = ["responsible-ai", "agentic-ai", "agent-safety", "prompt-injection", "tool-use"]
classifiers = [
  "Development Status :: 2 - Pre-Alpha",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
]
dependencies = [
  "rai-audit-core>=0.1.0",
]

[project.entry-points."rai_audit.plugins"]
agents = "rai_audit.agents.cli:register"

[tool.uv.sources]
rai-audit-core = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/rai_audit"]

[tool.hatch.build.targets.wheel.sources]
"src" = ""
