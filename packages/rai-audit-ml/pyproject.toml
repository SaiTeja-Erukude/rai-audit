[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "rai-audit-ml"
version = "0.1.2"
description = "Fairness, robustness, and data quality audits for traditional ML models"
readme = "README.md"
license = { file = "LICENSE" }
authors = [{ name = "Sai Teja Erukude" }]
requires-python = ">=3.10"
keywords = ["responsible-ai", "fairness", "bias", "machine-learning", "audit"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "Intended Audience :: Science/Research",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
  "rai-audit-core>=0.1.0",
  "numpy>=1.24",
  "pandas>=2.0",
  "scikit-learn>=1.3",
  "scipy>=1.11",
]

[project.optional-dependencies]
explainability = ["shap>=0.44"]

[project.entry-points."rai_audit.plugins"]
ml = "rai_audit.ml.cli:register"

[tool.hatch.build.targets.wheel]
packages = ["src/rai_audit"]

[tool.hatch.build.targets.wheel.sources]
"src" = ""
