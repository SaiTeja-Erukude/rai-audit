# Example: RAI Audit Gate in GitHub Actions
#
# Copy this file into your repository at .github/workflows/rai-audit-gate.yml
# and adjust the paths and thresholds to match your project.
#
# This workflow:
#   1. Installs rai-audit-ml
#   2. Runs your audit script to produce an audit-run.json
#   3. Calls `rai-audit gate` — exits 1 (blocking deployment) on failure
#   4. Exports a model card for the audit artifact
#   5. Uploads the report as a workflow artifact

name: RAI Audit Gate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rai-audit:
    name: Responsible AI Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install rai-audit-ml
        run: pip install rai-audit-ml

      # ── Run your audit script ───────────────────────────────────────────────
      # Replace this step with your actual audit script.
      # The script must produce a JSON file via report.to_json("audit-run.json").
      #
      # Minimal example (inline):
      - name: Run audit
        run: |
          python - <<'EOF'
          import numpy as np
          import pandas as pd
          from rai_audit.ml import ClassificationAudit

          rng = np.random.default_rng(42)
          n = 500
          y_true = rng.integers(0, 2, n)
          y_pred = y_true.copy()
          # Inject synthetic bias: flip 30 % of predictions for group B
          group = pd.DataFrame({"gender": rng.choice(["A", "B"], n)})
          flip_mask = (group["gender"] == "B") & (rng.random(n) < 0.30)
          y_pred[flip_mask] = 1 - y_pred[flip_mask]

          report = ClassificationAudit(
              y_true=y_true,
              y_pred=y_pred,
              sensitive_features=group,
              project_name="Example Classifier",
              persist=False,
          ).run()
          report.to_json("audit-run.json")
          EOF

      # ── Gate check ─────────────────────────────────────────────────────────
      # Exit code 1 if any CRITICAL findings exist.
      # Remove --fail-on-critical to allow critical findings through.
      - name: RAI Audit gate
        run: |
          rai-audit gate audit-run.json \
            --fail-on-critical \
            --output-json gate-result.json

      # ── Export model card (always, even on gate failure) ───────────────────
      - name: Export model card
        if: always()
        run: |
          rai-audit export model-card audit-run.json \
            --model-name "Example Classifier" \
            --model-version "${{ github.sha }}" \
            --output model-card.md

      # ── Upload artifacts ───────────────────────────────────────────────────
      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rai-audit-report-${{ github.run_number }}
          path: |
            audit-run.json
            gate-result.json
            model-card.md
          retention-days: 90
