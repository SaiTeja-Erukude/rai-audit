[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "rai-audit-llm"
version = "0.1.6"
description = "LLM and RAG audits including safety, security, hallucination, and citation checks"
readme = "README.md"
license = { file = "LICENSE" }
authors = [{ name = "Sai Teja Erukude" }]
requires-python = ">=3.10"
keywords = ["responsible-ai", "llm", "rag", "prompt-injection", "hallucination"]
classifiers = [
  "Development Status :: 2 - Pre-Alpha",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
]
dependencies = [
  "rai-audit-core>=0.1.0",
  "pyyaml>=6.0",
]

[project.optional-dependencies]
openai = ["openai>=1.0"]
anthropic = ["anthropic>=0.20"]

[project.entry-points."rai_audit.plugins"]
llm = "rai_audit.llm.cli:register"

[tool.uv.sources]
rai-audit-core = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/rai_audit"]

[tool.hatch.build.targets.wheel.sources]
"src" = ""
